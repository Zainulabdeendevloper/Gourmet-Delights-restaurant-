<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Gourmet Delights</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #007e5d;
      --secondary: #007e5d;
      --accent: #e0e0e0;
      --dark: #292929;
      --light: #f9f9f9;
      --gray: #e0e0e0;
      --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-position: center;
      padding: 20px;
    }

    .login-container {
      background-color: white;
      border-radius: 15px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 450px;
      overflow: hidden;
      animation: fadeIn 0.8s ease;
    }

    .login-header {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      padding: 30px 20px;
      text-align: center;
      color: white;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: #f8c828;
      
    }

    .logo i {
      margin-right: 10px;
      color: #f8c828;
      font-size: 36px;
    }

    .login-header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .login-form {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color:#445453;
      font-size: 18px;
    }

    .input-with-icon input {
      width: 100%;
      padding: 15px 15px 15px 50px;
      border: 1px solid var(--gray);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      transition: var(--transition);
    }

    .input-with-icon input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(255, 107, 107, 0.2);
    }

    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(#f8c828cc , #f8c828);
      color: rgb(0, 0, 0);
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .form-footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--gray);
    }

   .form-footer a {
  color: black;
  text-decoration: none;
  font-weight: 500;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
}

.form-footer a:hover {
  color:var(--dark) ;
  transform: translateX(5px);
}


    .form-footer a i {
      margin-left: 5px;
      font-size: 14px;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    .message.success {
      background-color: rgba(78, 205, 196, 0.2);
      color: #1a7c74;
      border: 1px solid var(--accent);
    }

    .message.error {
      background-color: rgba(255, 107, 107, 0.2);
      color: #c44545;
      border: 1px solid var(--primary);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.5s ease;
    }

    /* Responsive Styles */
    @media (max-width: 576px) {
      .login-container {
        max-width: 100%;
      }
      
      .login-form {
        padding: 20px;
      }
      
      .logo {
        font-size: 28px;
      }
      
      .logo i {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-utensils"></i>
        Gourmet Delights
      </div>
      <p>Premium Food Delivery</p>
    </div>
    
    <div class="login-form">
      <div id="message" class="message"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope"></i>
            <input 
              type="email" 
              id="email" 
              placeholder="Enter your email" 
              required 
              autocomplete="email"
            />
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password" 
              required 
              autocomplete="current-password"
            />
          </div>
        </div>
        
        <button type="submit" class="btn">Login</button>
      </form>
      
      <div class="form-footer">
        <a href="register.html">
          Don't have an account? Register
          <i class="fas fa-arrow-right"></i>
        </a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const messageEl = document.getElementById("message");
      
      // Simple validation
      if (!email || !password) {
        showMessage("Please fill in all fields", "error");
        document.getElementById("loginForm").classList.add("shake");
        setTimeout(() => {
          document.getElementById("loginForm").classList.remove("shake");
        }, 500);
        return;
      }

      // Show loading state
      const submitBtn = document.querySelector('.btn');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "Logging in...";
      submitBtn.disabled = true;

      try {
        const users = storage.users.getUsers();
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
          // ✅ Save login info in localStorage
          localStorage.setItem("userId", user.id);
          localStorage.setItem("username", user.username);
          localStorage.setItem("currentUser", JSON.stringify(user));
          
          showMessage("Login successful! Redirecting...", "success");
          
          // Redirect after a short delay
          setTimeout(() => {
            window.location.href = "index.html"; // redirect to home page
          }, 1500);
        } else {
          showMessage("Invalid email or password", "error");
          document.getElementById("loginForm").classList.add("shake");
          setTimeout(() => {
            document.getElementById("loginForm").classList.remove("shake");
          }, 500);
        }
      } catch (error) {
        console.error("Login error:", error);
        showMessage("An error occurred. Please try again.", "error");
      } finally {
        // Reset button state
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    function showMessage(text, type) {
      const messageEl = document.getElementById("message");
      messageEl.textContent = text;
      messageEl.className = "message " + type;
      messageEl.style.display = "block";
      
      // Auto-hide success messages after 3 seconds
      if (type === "success") {
        setTimeout(() => {
          messageEl.style.display = "none";
        }, 3000);
      }
    }

    // Demo login for testing (remove in production)
    document.addEventListener("DOMContentLoaded", () => {
      // Pre-fill with demo credentials for testing
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
    });
  </script>
  <script src="JavaScripts/storage.js"></script>
</body>
</html>
