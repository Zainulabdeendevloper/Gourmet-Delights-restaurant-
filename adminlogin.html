<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin login</title>
    <style>
        .login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.login-box {
    background: white;
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

.login-box h2 {
    text-align: center;
    margin-bottom: 1.5rem;
    color: #333;
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #555;
}

.form-group input {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
}

.login-btn {
    width: 100%;
    padding: 0.75rem;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s;
}

.login-btn:hover {
    background: #5a6fd8;
}
    </style>
</head>
<body>
    <!-- Admin Login Section -->
<div id="admin-login" class="login-container">
    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div id="login-error" style="color: red; margin-top: 10px; display: none;"></div>
    </div>
</div>

<!-- Your existing dashboard (initially hidden) -->
<div id="admin-dashboard" style="display: none;">
    <!-- Your existing admin panel content goes here -->


    <script>
        // ===========================
// Admin Authentication
// ===========================
let ADMIN_TOKEN = localStorage.getItem("adminToken");

// Check if already logged in
function checkAuth() {
    if (localStorage.getItem("adminLoggedIn")) {
        showDashboard();
    } else {
        showLogin();
    }
}
        .catch(() => showLogin());
    } else {
        showLogin();
    }
}

// Show login page
function showLogin() {
    document.getElementById("admin-login").style.display = "flex";
    document.getElementById("admin-dashboard").style.display = "none";
    ADMIN_TOKEN = null;
    localStorage.removeItem("adminToken");
}

// Show dashboard
function showDashboard() {
    document.getElementById("admin-login").style.display = "none";
    document.getElementById("admin-dashboard").style.display = "block";
    
    // Initialize your admin panel
    fetchOrders();
    loadMessages();
    loadSubscribers();
    loadActiveOrders();
    loadOrderHistory();
}

// Login form handler
document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("login-error");

    try {
        if (username === "admin" && password === "admin") {
            localStorage.setItem("adminLoggedIn", "true");
            errorDiv.style.display = "none";
            showDashboard();
        } else {
            errorDiv.textContent = "Invalid credentials";
            errorDiv.style.display = "block";
        }
    } catch (error) {
        console.error("Login error:", error);
        errorDiv.textContent = "An error occurred";
        errorDiv.style.display = "block";
    }
});

// Logout function (add a logout button to your dashboard)
function logout() {
    if (confirm("Are you sure you want to logout?")) {
        showLogin();
    }
}

// Add logout button to your HTML and call this function

// Initialize app
document.addEventListener("DOMContentLoaded", checkAuth);
    </script>
    <script src="JavaScripts/storage.js"></script>
</div>
</body>
</html>
